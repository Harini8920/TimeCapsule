<!DOCTYPE html>
<html>
<head>
    <title>Extinct Species – Time Capsule</title>
    <meta charset="UTF-8">
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #f5f0e6, #e8dfd8);
            color: #3e2723;
            padding: 20px;
        }

        h1 {
            text-align: center;
            margin: 30px 0;
            color: #4e342e;
        }

        h2 {
            text-align: center;
            margin: 40px 0 20px;
            color: #5d4037;
            padding-bottom: 10px;
            border-bottom: 2px solid #d7ccc8;
        }

        /* Category buttons */
        .category-container {
            max-width: 1000px;
            margin: 30px auto;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }

        .category-btn {
            background: white;
            padding: 25px 15px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            cursor: pointer;
            transition: all 0.3s ease;
            border: none;
            font-size: 18px;
            color: #5d4037;
            font-weight: bold;
        }

        .category-btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 25px rgba(0,0,0,0.15);
        }

        .category-btn.animals { background: #ffebee; }
        .category-btn.sea { background: #e3f2fd; }
        .category-btn.birds { background: #f3e5f5; }
        .category-btn.plants { background: #e8f5e8; }

        /* Gallery grid */
        .gallery {
            max-width: 1200px;
            margin: 0 auto 50px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
            gap: 25px;
            display: none; /* Hidden by default */
        }

        .gallery.active {
            display: grid;
        }

        /* Species cards */
        .card {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 6px 15px rgba(0,0,0,0.08);
            transition: transform 0.3s ease;
            cursor: pointer;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .card img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            border-bottom: 1px solid #eee;
        }

        .card h3 {
            padding: 15px;
            margin: 0;
            text-align: center;
            color: #5d4037;
            font-size: 16px;
            min-height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Navigation and buttons */
        .nav-buttons {
            text-align: center;
            margin: 30px 0;
        }

        .nav-btn {
            background: #6d4c41;
            color: white;
            border: none;
            padding: 10px 25px;
            margin: 0 10px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.3s ease;
        }

        .nav-btn:hover {
            background: #5d4037;
        }

        .back {
            display: block;
            margin: 30px auto;
            width: fit-content;
            padding: 12px 30px;
            background: #6d4c41;
            color: white;
            text-decoration: none;
            border-radius: 30px;
            font-weight: bold;
            border: none;
            cursor: pointer;
        }

        .back:hover {
            background: #5d4037;
        }

        /* MODAL STYLES */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 1000;
            overflow-y: auto;
        }

        .modal-content {
            background: white;
            margin: 50px auto;
            padding: 30px;
            border-radius: 20px;
            width: 90%;
            max-width: 900px;
            position: relative;
            animation: modalFade 0.3s ease;
        }

        @keyframes modalFade {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .close-modal {
            position: absolute;
            top: 15px;
            right: 15px;
            background: #6d4c41;
            color: white;
            width: 35px;
            height: 35px;
            border-radius: 50%;
            border: none;
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-body {
            display: flex;
            flex-wrap: wrap;
            gap: 30px;
        }

        .modal-image {
            flex: 1;
            min-width: 300px;
        }

        .modal-image img {
            width: 100%;
            max-height: 400px;
            object-fit: cover;
            border-radius: 15px;
            cursor: pointer;
            transition: transform 0.3s ease;
        }

        .modal-image img:hover {
            transform: scale(1.02);
        }

        .modal-info {
            flex: 2;
            min-width: 300px;
        }

        .modal-info h3 {
            color: #4e342e;
            margin-top: 0;
            font-size: 28px;
            border-bottom: 2px solid #d7ccc8;
            padding-bottom: 10px;
        }

            line-height: 1.6;
            font-size: 16px;
            color: #5d4037;
        }

            background: #f5f0e6;
            padding: 20px;
            border-radius: 10px;
            margin-top: 20px;
        }

        .info-details h4 {
            color: #5d4037;
            margin-bottom: 10px;

            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }

            max-width: 90%;
            max-height: 90%;
            border-radius: 10px;
        }

        .close-full-image {
            position: absolute;
            top: 20px;
            right: 20px;
            background: white;
            color: black;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: none;
            font-size: 24px;
            cursor: pointer;
        }
    </style>
</head>

    // Generate galleries
    function generateGalleries() {
        for (const category in speciesData) {
            const gallery = document.getElementById(category + '-gallery');
            gallery.innerHTML = '';
            
            speciesData[category].forEach(species => {
                const card = document.createElement('div');
                card.className = 'card';
                card.onclick = () => openModal(species, category);
                
                card.innerHTML = `
                    <img src="${species.image}" alt="${species.name}" loading="lazy">
                    <h3>${species.name}</h3>
                `;
                
                gallery.appendChild(card);
            });
        }
    }

    // Modal functions
    function openModal(species, category) {
        document.getElementById('modalImg').src = species.image;
        document.getElementById('modalImg').alt = species.name;
        document.getElementById('modalTitle').textContent = species.name;
        document.getElementById('modalDescription').textContent = species.description;
        document.getElementById('modalDetails').textContent = species.details;
        document.getElementById('speciesModal').style.display = 'block';
        document.body.style.overflow = 'hidden';
    }

    function closeModal() {
        document.getElementById('speciesModal').style.display = 'none';
        document.body.style.overflow = 'auto';
    }

    function showFullImage() {
        const imgSrc = document.getElementById('modalImg').src;
        document.getElementById('fullImage').src = imgSrc;
        document.getElementById('fullImageModal').style.display = 'flex';
    }

    function closeFullImage() {
        document.getElementById('fullImageModal').style.display = 'none';
    }

    window.onclick = function(event) {
        const modal = document.getElementById('speciesModal');
        const fullImageModal = document.getElementById('fullImageModal');
        
        if (event.target == modal) {
            closeModal();
        }
        if (event.target == fullImageModal) {
            closeFullImage();
        }
    }

    // Category display functions
    function showAllCategories() {
        const galleries = document.querySelectorAll('.gallery');
        const titles = document.querySelectorAll('h2');
        
        galleries.forEach(gallery => {
            gallery.classList.add('active');
        });
        
        titles.forEach(title => {
            title.style.display = 'block';
        });
    }
    
    function showCategory(category) {
        const galleries = document.querySelectorAll('.gallery');
        const titles = document.querySelectorAll('h2');
        
        galleries.forEach(gallery => {
            gallery.classList.remove('active');
        });
        
        titles.forEach(title => {
            title.style.display = 'none';
        });
        
        document.getElementById(category + '-gallery').classList.add('active');
        document.getElementById(category + '-title').style.display = 'block';
        
        document.getElementById(category + '-gallery').scrollIntoView({behavior: 'smooth'});
    }
    
    // Initialize
    window.onload = function() {
        generateGalleries();
        showAllCategories();
    }
</script>

</body>
</html>
