<!DOCTYPE html>
<html>
<head>
    <title>Endangered Species – Time Capsule</title>
    <meta charset="UTF-8">
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #e8f5e9, #c8e6c9);
            color: #1b5e20;
            padding: 20px;
        }

        h1 {
            text-align: center;
            margin: 30px 0;
            color: #2e7d32;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.1);
        }

        h2 {
            text-align: center;
            margin: 40px 0 20px;
            color: #388e3c;
            padding-bottom: 10px;
            border-bottom: 2px solid #a5d6a7;
        }

        /* Category buttons */
        .nav-buttons {
            text-align: center;
            margin: 30px 0;
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            max-width: 900px;
            margin-left: auto;
            margin-right: auto;
        }

        .nav-btn {
            background: #4caf50;
            color: white;
            border: none;
            padding: 12px 25px;
            margin: 5px 10px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
            font-size: 16px;
        }

        .nav-btn:hover {
            background: #388e3c;
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }

        .nav-btn.show-all {
            background: #2e7d32;
        }

        /* Gallery grid */
        .gallery {
            max-width: 1200px;
            margin: 0 auto 50px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
            gap: 25px;
            display: none;
        }

        .gallery.active {
            display: grid;
        }

        /* Species cards */
        .card {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 6px 15px rgba(0,0,0,0.08);
            transition: all 0.3s ease;
            cursor: pointer;
            border: 3px solid transparent;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.15);
            border-color: #4caf50;
        }

        .card img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            border-bottom: 1px solid #e0e0e0;
        }

        .card h3 {
            padding: 15px;
            margin: 0;
            text-align: center;
            color: #2e7d32;
            font-size: 16px;
            min-height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f1f8e9;
        }

        .back {
            display: block;
            margin: 30px auto;
            width: fit-content;
            padding: 12px 30px;
            background: #4caf50;
            color: white;
            text-decoration: none;
            border-radius: 30px;
            font-weight: bold;
            border: none;
            cursor: pointer;
            transition: background 0.3s ease;
        }

        .back:hover {
            background: #388e3c;
        }

        /* MODAL STYLES */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 1000;
            overflow-y: auto;
            padding: 20px;
            box-sizing: border-box;
        }

        .modal-content {
            background: white;
            margin: 30px auto;
            padding: 30px;
            border-radius: 20px;
            width: 95%;
            max-width: 900px;
            position: relative;
            animation: modalFade 0.3s ease;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }

        @keyframes modalFade {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .close-modal {
            position: absolute;
            top: 15px;
            right: 15px;
            background: #4caf50;
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: none;
            font-size: 24px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.3s ease;
            z-index: 10;
        }

        .close-modal:hover {
            background: #388e3c;
        }

        .modal-body {
            display: flex;
            flex-wrap: wrap;
            gap: 30px;
            margin-top: 10px;
        }

        .modal-image {
            flex: 1;
            min-width: 300px;
        }

        .modal-image img {
            width: 100%;
            max-height: 400px;
            object-fit: cover;
            border-radius: 15px;
            cursor: pointer;
            transition: transform 0.3s ease;
            border: 3px solid #e8f5e9;
        }

        .modal-image img:hover {
            transform: scale(1.02);
        }

        .modal-info {
            flex: 2;
            min-width: 300px;
        }

        .modal-info h3 {
            color: #2e7d32;
            margin-top: 0;
            font-size: 28px;
            border-bottom: 2px solid #c8e6c9;
            padding-bottom: 15px;
            margin-bottom: 20px;
        }

        .modal-info p {
            line-height: 1.7;
            font-size: 16px;
            color: #424242;
            margin-bottom: 20px;
        }

        .info-details {
            background: #f1f8e9;
            padding: 20px;
            border-radius: 10px;
            margin-top: 20px;
            border-left: 5px solid #4caf50;
        }

        .info-details h4 {
            color: #2e7d32;
            margin-bottom: 15px;
            font-size: 18px;
        }

        .info-details p {
            color: #616161;
            margin: 8px 0;
            font-size: 15px;
        }

        .status-badge {
            display: inline-block;
            background: #ff5722;
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: bold;
            margin-bottom: 15px;
        }

        .status-badge.critically {
            background: #d32f2f;
        }

        .status-badge.endangered {
            background: #ff9800;
        }

        /* Full image modal */
        .full-image-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.97);
            z-index: 2000;
            justify-content: center;
            align-items: center;
            padding: 20px;
            box-sizing: border-box;
        }

        .full-image-modal img {
            max-width: 90%;
            max-height: 90%;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .close-full-image {
            position: absolute;
            top: 20px;
            right: 20px;
            background: white;
            color: #2e7d32;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: none;
            font-size: 28px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .close-full-image:hover {
            background: #4caf50;
            color: white;
            transform: rotate(90deg);
        }

        /* Responsive adjustments */
        @media (max-width: 768px) {
            .modal-body {
                flex-direction: column;
            }
            
            .modal-image, .modal-info {
                min-width: 100%;
            }
            
            .nav-buttons {
                padding: 15px 10px;
            }
            
            .nav-btn {
                padding: 10px 15px;
                margin: 5px;
                font-size: 14px;
            }
            
            .gallery {
                grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
                gap: 15px;
            }
        }
    </style>
</head>

    // Generate galleries
    function generateGalleries() {
        for (const category in speciesData) {
            const gallery = document.getElementById(category + '-gallery');
            gallery.innerHTML = '';
            
            speciesData[category].forEach(species => {
                const card = document.createElement('div');
                card.className = 'card';
                card.onclick = () => openModal(species, category);
                
                card.innerHTML = `
                    <img src="${species.image}" alt="${species.name}" loading="lazy">
                    <h3>${species.name}<br><small>${species.status}</small></h3>
                `;
                
                gallery.appendChild(card);
            });
        }
    }

    // Modal functions
    function openModal(species, category) {
        document.getElementById('modalImg').src = species.image;
        document.getElementById('modalImg').alt = species.name;
        document.getElementById('modalTitle').textContent = species.name;
        
        // Set status badge with appropriate class
        const statusBadge = document.getElementById('modalStatus');
        statusBadge.textContent = species.status;
        statusBadge.className = 'status-badge ' + 
            (species.status.includes('Critically') ? 'critically' : 
             species.status.includes('Endangered') ? 'endangered' : 'vulnerable');
        
        document.getElementById('modalDescription').textContent = species.description;
        document.getElementById('modalDetails').innerHTML = species.details.replace(/•/g, '<br>•');
        
        // Add population and threats if available
        const populationEl = document.getElementById('modalPopulation');
        const threatsEl = document.getElementById('modalThreats');
        
        if (species.population) {
            populationEl.textContent = species.population;
        } else {
            populationEl.textContent = '';
        }
        
        if (species.threats) {
            threatsEl.innerHTML = species.threats.replace(/•/g, '<br>•');
        } else {
            threatsEl.textContent = '';
        }
        
        document.getElementById('speciesModal').style.display = 'block';
        document.body.style.overflow = 'hidden';
    }

    function closeModal() {
        document.getElementById('speciesModal').style.display = 'none';
        document.body.style.overflow = 'auto';
    }

    function showFullImage() {
        const imgSrc = document.getElementById('modalImg').src;
        document.getElementById('fullImage').src = imgSrc;
        document.getElementById('fullImageModal').style.display = 'flex';
    }

    function closeFullImage() {
        document.getElementById('fullImageModal').style.display = 'none';
    }

    // Close modals when clicking outside
    window.onclick = function(event) {
        const modal = document.getElementById('speciesModal');
        const fullImageModal = document.getElementById('fullImageModal');
        
        if (event.target == modal) {
            closeModal();
        }
        if (event.target == fullImageModal) {
            closeFullImage();
        }
    }

    // Category display functions
    function showAllCategories() {
        const galleries = document.querySelectorAll('.gallery');
        const titles = document.querySelectorAll('h2');
        
        galleries.forEach(gallery => {
            gallery.classList.add('active');
        });
        
        titles.forEach(title => {
            title.style.display = 'block';
        });
        
        // Scroll to top of galleries
        window.scrollTo({top: document.querySelector('.nav-buttons').offsetTop, behavior: 'smooth'});
    }
    
    function showCategory(category) {
        const galleries = document.querySelectorAll('.gallery');
        const titles = document.querySelectorAll('h2');
        
        galleries.forEach(gallery => {
            gallery.classList.remove('active');
        });
        
        titles.forEach(title => {
            title.style.display = 'none';
        });
        
        document.getElementById(category + '-gallery').classList.add('active');
        document.getElementById(category + '-title').style.display = 'block';
        
        document.getElementById(category + '-gallery').scrollIntoView({behavior: 'smooth'});
    }
    
    // Initialize
    window.onload = function() {
        generateGalleries();
        showAllCategories();
    }
</script>
